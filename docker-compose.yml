services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: authwarden-app
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: postgres://authwarden:authwarden@postgres:5432/authwarden
      REDIS_URL: redis://redis:6379
      JWT_SECRET: authwarden-local-development-secret
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: authwarden-postgres
    environment:
      POSTGRES_DB: authwarden
      POSTGRES_USER: authwarden
      POSTGRES_PASSWORD: authwarden
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authwarden -d authwarden"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: authwarden-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
