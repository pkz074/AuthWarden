apiVersion: apps/v1
kind: Deployment
metadata:
  name: authwarden
  namespace: authwarden
  labels:
    app.kubernetes.io/name: authwarden
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: authwarden
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authwarden
    spec:
      containers:
        - name: authwarden
          image: ghcr.io/pkz074/authwarden:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: authwarden-config
            - secretRef:
                name: authwarden-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
